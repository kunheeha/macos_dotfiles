##############################
# Default Shell
##############################
set-option -g default-shell /bin/zsh

##############################
# Prefix Key
##############################
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

##############################
# Options
##############################

# Reload tmux config
bind e source-file ~/.tmux.conf

set -g mouse on
set -s escape-time 0

# Use 256color
set -g default-terminal "tmux-256color"
set -sg terminal-overrides ",*:RGB"

# Set status bar background to terminal colour
set -g status-style bg=terminal

# Increase status-left-length (default is 10)
set -g status-left-length 50
# Increase status-right-length (default is 40)
set -g status-right-length 150
# Refresh status bar every 1 second (default is 15)
set -g status-interval 1

# StatusBar Layout
set -g status-justify left

##############################
# Navigation
##############################

# Movement with vimkeys
source-file ~/.tmux_vim_nav.conf

# Split panes with vimkeys
unbind %
unbind '"'
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'

# Scratchpad session popup
bind o display-popup -E "tmux new-session -A -s scratch"

# Git session popup
bind g display-popup -E "tmux new-session -A -s git"

# Session jumper popup
bind r display-popup -E "tmux list-sessions | sed 's/:.*$//' | fzf --reverse --preview \"tmux capture-pane -pt {}\" | xargs tmux switch-client -t"

# switch to last session
bind b switch-client -l

# Pane jumper popup
# bind f display-popup -E "tmux list-windows | sed -E 's/[0-9]+: ([^ ]+).*$/\\1/' | fzf --reverse --preview \"tmux capture-pane -pt {}\" | xargs tmux switch-window -t"


##############################
# Plugins
##############################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run "~/.tmux/plugins/tpm/tpm"

##############################
# Theme
##############################
source-file ~/dots/tmux/current-theme.conf
